<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brijjworks — Metabase Analytics Integration Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;color:#1E293B;background:#F1F5F9;-webkit-font-smoothing:antialiased}

/* Proto Navigator */
.proto-root{display:flex;height:100vh}
.proto-nav{width:200px;flex-shrink:0;background:#0F172A;overflow-y:auto;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06)}
.proto-nav-title{padding:16px 16px 12px;font-size:10px;font-weight:700;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.proto-group{padding:0 8px 8px}
.proto-group-label{font-size:10px;font-weight:700;color:#3B82F6;letter-spacing:.08em;text-transform:uppercase;padding:10px 8px 6px}
.proto-item{display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:6px;font-size:12px;color:#94A3B8;font-family:inherit;transition:all .2s ease}
.proto-item:hover{background:rgba(59,130,246,.1);color:#CBD5E1}
.proto-item.active{background:#3B82F6;color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(59,130,246,.3)}

/* Shell */
.bw-shell{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.bw-topbar{height:52px;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.bw-logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:.06em}
.bw-company{font-size:12px;color:#93C5FD;padding:4px 12px;background:rgba(59,130,246,.15);border-radius:20px;font-weight:500}
.bw-user-area{margin-left:auto;display:flex;align-items:center;gap:10px}
.bw-user-name{font-size:12px;color:rgba(255,255,255,.6)}
.bw-user{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.bw-body{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.bw-sidebar{width:56px;background:#0F172A;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06)}
.bw-nav-item{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease;color:#64748B;background:none;border:none}
.bw-nav-item:hover{background:rgba(59,130,246,.1);color:#93C5FD}
.bw-nav-item.active{background:#3B82F6;color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.bw-nav-sep{height:1px;background:rgba(255,255,255,.06);width:28px;margin:6px 0}

/* Content */
.bw-content{flex:1;overflow-y:auto;background:#F8FAFC;padding:28px;position:relative}

/* Cards */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-header{padding:16px 20px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.01em}
.b-green{background:#DCFCE7;color:#15803D}
.b-red{background:#FEE2E2;color:#DC2626}
.b-amber{background:#FEF3C7;color:#B45309}
.b-gray{background:#F1F5F9;color:#64748B}
.b-blue{background:#DBEAFE;color:#2563EB}
.b-purple{background:#F3E8FF;color:#7C3AED}
.b-indigo{background:#E0E7FF;color:#4338CA}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;transition:all .2s ease;letter-spacing:.01em}
.btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff}
.btn-primary:hover{box-shadow:0 4px 12px rgba(59,130,246,.35)}
.btn-outline{background:#fff;color:#1E293B;border:1px solid #D1D5DB}
.btn-outline:hover{background:#F8FAFC;border-color:#94A3B8}
.btn-danger{background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff}
.btn-danger:hover{box-shadow:0 4px 12px rgba(239,68,68,.35)}
.btn-ghost{background:transparent;color:#3B82F6;border:1px solid #93C5FD}
.btn-ghost:hover{background:#EFF6FF}
.btn-success{background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-lg{padding:11px 24px;font-size:14px;border-radius:10px}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;background:#F8FAFC;border:1px solid #E2E8F0;color:#64748B;cursor:pointer;transition:all .2s}
.btn-icon:hover{background:#EFF6FF;color:#3B82F6;border-color:#93C5FD}
.btn-icon-danger:hover{background:#FEF2F2;color:#DC2626;border-color:#FECACA}

/* Inputs */
input,select{font-family:inherit;font-size:13px;padding:9px 12px;border:1px solid #D1D5DB;border-radius:8px;outline:none;background:#fff;color:#1E293B;width:100%;transition:all .2s ease}
input:focus,select:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
input::placeholder{color:#94A3B8}
label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:6px;letter-spacing:.02em}

/* Tabs */
.tab-bar{display:flex;gap:0;border-bottom:2px solid #E2E8F0;margin-bottom:24px}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:#64748B;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit;letter-spacing:.01em}
.tab.active{color:#3B82F6;border-bottom-color:#3B82F6}
.tab:hover:not(.active){color:#1E293B;background:rgba(59,130,246,.04)}

/* Segmented Control */
.seg-ctrl{display:inline-flex;background:#F1F5F9;border-radius:8px;padding:3px;gap:2px;border:1px solid #E2E8F0}
.seg-btn{padding:7px 14px;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;border-radius:6px;border:none;background:transparent;font-family:inherit;transition:all .2s}
.seg-btn.active{background:#fff;color:#1E293B;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.seg-btn:hover:not(.active){color:#1E293B}

/* Table */
.table{width:100%;border-collapse:separate;border-spacing:0}
.table th{text-align:left;font-size:11px;font-weight:700;color:#64748B;letter-spacing:.06em;text-transform:uppercase;padding:10px 14px;border-bottom:2px solid #E2E8F0;background:#FAFBFC}
.table td{padding:12px 14px;border-bottom:1px solid #F1F5F9;vertical-align:middle;transition:background .15s}
.table tr:hover td{background:#F8FAFC}
.table tr:last-child td{border-bottom:none}

/* Misc */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:#22C55E}
.dot-amber{background:#F59E0B}
.dot-gray{background:#94A3B8}
.dot-red{background:#EF4444}

/* Wizard */
.wizard-step{display:flex;gap:14px;padding:12px 0;align-items:flex-start}
.step-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;transition:all .3s}
.step-content{flex:1;padding-top:5px}
.step-label{font-size:13px;font-weight:600;color:#1E293B}
.step-sub{font-size:12px;color:#64748B;margin-top:2px}
.step-connector{width:2px;height:18px;background:#E2E8F0;margin:2px 0 2px 15px;transition:background .3s}

/* Stats */
.stat-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px;flex:1;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);transform:translateY(-1px)}
.stat-val{font-size:28px;font-weight:800;color:#0F172A;letter-spacing:-.02em}
.stat-label{font-size:12px;color:#64748B;margin-top:4px;font-weight:500}

/* Overlay & Modal */
.overlay{position:absolute;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:#fff;border-radius:14px;border:1px solid #E2E8F0;width:520px;max-height:88%;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:18px 22px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:22px}
.modal-footer{padding:16px 22px;border-top:1px solid #F1F5F9;display:flex;justify-content:flex-end;gap:8px}

/* Progress */
.pbar{height:5px;background:#E2E8F0;border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,#3B82F6,#6366F1);border-radius:3px;transition:width .5s ease}

/* Metabase Chrome */
.mb-chrome{background:#509EE3;height:38px;display:flex;align-items:center;padding:0 18px;gap:18px;flex-shrink:0}
.mb-logo{font-size:13px;font-weight:700;color:#fff;letter-spacing:.02em}
.mb-nav-item{font-size:12px;color:rgba(255,255,255,.7);cursor:pointer}
.mb-nav-item.mb-active{color:#fff;font-weight:600}

/* Metric Cards */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px}
.bar{border-radius:4px 4px 0 0;background:linear-gradient(180deg,#3B82F6,#2563EB);min-width:18px;transition:height .3s}
.bar-alt{background:linear-gradient(180deg,#93C5FD,#60A5FA)}
.metric-card{background:#FAFBFC;border:1px solid #E2E8F0;border-radius:10px;padding:14px 18px}
.metric-val{font-size:22px;font-weight:800;color:#0F172A;letter-spacing:-.02em}
.metric-lbl{font-size:11px;color:#64748B;font-weight:500}
.metric-chg{font-size:11px;color:#16A34A;font-weight:600}

/* Alerts */
.alert{display:flex;gap:10px;padding:12px 16px;border-radius:10px;font-size:13px;align-items:flex-start}
.alert-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.alert-err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.alert-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.alert-succ{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}

/* App Sidebar */
.analytics-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#64748B;transition:all .2s}
.analytics-item:hover{background:rgba(59,130,246,.1);color:#3B82F6}
.analytics-item.ai-active{background:rgba(59,130,246,.15);color:#3B82F6}
.bw-sidebar-wide{width:210px;background:#0F172A;padding:14px 10px;overflow-y:auto;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06)}
.sw-section{font-size:10px;font-weight:700;color:#475569;letter-spacing:.08em;padding:12px 8px 6px;text-transform:uppercase}
.sw-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#94A3B8;font-weight:500;transition:all .2s}
.sw-item:hover{background:rgba(255,255,255,.06);color:#CBD5E1}
.sw-item.active{background:rgba(59,130,246,.2);color:#60A5FA}
.sw-sep{height:1px;background:rgba(255,255,255,.06);margin:8px 0}

/* Permissions */
.perm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F1F5F9;transition:background .15s}
.perm-row:last-child{border-bottom:none}
.perm-row:hover{background:#FAFBFC}
.drag-handle{cursor:grab;color:#CBD5E1;padding:0 4px}

/* Chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;font-size:12px;font-weight:500;color:#1D4ED8}
.chip-role{background:#F3E8FF;border-color:#D8B4FE;color:#7C3AED}
.chip-remove{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,.06);border:none;font-size:10px;color:inherit;transition:background .15s}
.chip-remove:hover{background:rgba(0,0,0,.12)}

/* Error */
.error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:40px}

/* Tooltip */
.tooltip-wrap{position:relative}
.tooltip-text{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0F172A;color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;white-space:nowrap;z-index:99}
.tooltip-wrap:hover .tooltip-text{display:block}

/* Empty state */
.empty-state{text-align:center;padding:32px 20px;color:#94A3B8}
.empty-state-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.empty-state-title{font-size:14px;font-weight:600;color:#64748B;margin-bottom:4px}
.empty-state-sub{font-size:12px;color:#94A3B8}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s ease infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .35s ease}
</style>
</head>

/* ── Helpers ── */
const Badge=({type,children})=>{
  const cls={active:"b-green",connected:"b-green",pending:"b-amber",degraded:"b-amber",deactivated:"b-gray",stale:"b-red",error:"b-red","not-connected":"b-gray",disconnected:"b-gray",suspended:"b-gray"}[type]||"b-gray";

};

const Btn=({children,variant="primary",size="",onClick,disabled,style:s})=>
  e("button",{className:`btn btn-${variant} ${size?"btn-"+size:""}`,onClick,disabled,style:{opacity:disabled?.5:1,cursor:disabled?"not-allowed":"pointer",...s}},children);

const StepIcon=({state,num})=>{
  const s={pending:{bg:"#F1F5F9",color:"#94A3B8"},running:{bg:"#DBEAFE",color:"#3B82F6"},complete:{bg:"#DCFCE7",color:"#16A34A"},error:{bg:"#FEE2E2",color:"#DC2626"}}[state];

  return e("div",{className:"step-icon",style:{background:s.bg,color:s.color}},
    state==="complete"?SVG_ICONS.check:state==="error"?SVG_ICONS.x:state==="running"?e("span",{className:"spin",style:{fontSize:12}},"*"):num
  );
};

const SVG_ICONS={
  home:e("svg",{width:16,height:16,fill:"none",stroke:"currentColor",strokeWidth:2,viewBox:"0 0 24 24"},e("path",{d:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"}),e("polyline",{points:"9 22 9 12 15 12 15 22"})),
  users:e("svg",{width:16,height:16,fill:"none",stroke:"currentColor",strokeWidth:2,viewBox:"0 0 24 24"},e("path",{d:"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"}),e("circle",{cx:"9",cy:"7",r:"4"}),e("path",{d:"M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"})),

/* ── Screen: Wizard ── */
const ScreenWizard=({mode="running",onNavigate})=>{
  const [steps,setSteps]=useState(Array(7).fill("pending"));
  const [current,setCurrent]=useState(-1);
  const [elapsed,setElapsed]=useState(0);
  const elRef=useRef(null);
  useEffect(()=>{if(current===-1)setCurrent(0);},[]);
  useEffect(()=>{
    if(current<0||current>=7) return;
    setSteps(p=>{const n=[...p];n[current]="running";return n;});
    const dur=mode==="error"&&current===2?1800:[1600,2400,900,800,700,600,500][current];
    const t=setTimeout(()=>{
      if(mode==="error"&&current===2){setSteps(p=>{const n=[...p];n[2]="error";return n;});setCurrent(99);}
      else{setSteps(p=>{const n=[...p];n[current]="complete";return n;});setCurrent(current<6?current+1:7);}
    },dur);
    return()=>clearTimeout(t);
  },[current]);
  useEffect(()=>{
    if(current===1&&steps[1]==="running"){elRef.current=setInterval(()=>setElapsed(ee=>ee+1),1000);return()=>clearInterval(elRef.current);}
    return()=>clearInterval(elRef.current);
  },[current,steps[1]]);
  const pct=mode==="complete"?100:Math.round((steps.filter(s=>s==="complete").length/7)*100);
  const allDone=mode==="complete"||current===7;
  return e("div",{className:"slide-up"},
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}},
      e("div",null,
        e("div",{style:{fontSize:22,fontWeight:700,color:"#0F172A",marginBottom:4}},allDone?"Connection complete!":mode==="error"?"Provisioning failed":"Connecting to Metabase..."),
        e("div",{style:{fontSize:13,color:"#64748B"}},allDone?"Your Metabase instance is ready.":mode==="error"?"A step failed. Review and retry.":"Provisioning your dedicated Metabase instance in AKS.")
      )
    ),
    e("div",{className:"card"},
      e("div",{className:"card-header"},
        e("span",{style:{fontSize:14,fontWeight:700,color:"#0F172A"}},allDone?"All steps complete":`Step ${Math.min(current+1,7)} of 7`),
        e("div",{style:{display:"flex",alignItems:"center",gap:12}},
          e("div",{className:"pbar",style:{width:140}},e("div",{className:"pbar-fill",style:{width:pct+"%"}})),
          e("span",{style:{fontSize:12,fontWeight:600,color:pct===100?"#16A34A":"#64748B",minWidth:36}},pct+"%")
        )
      ),
      e("div",{className:"card-body",style:{paddingTop:14,paddingBottom:14}},
        WIZARD_STEPS.map((s,i)=>{
          const st=mode==="complete"?"complete":steps[i];
          return e("div",{key:i},
            e("div",{className:"wizard-step"},
              e(StepIcon,{state:st,num:i+1}),
              e("div",{className:"step-content"},
                e("div",{className:"step-label",style:{color:st==="pending"?"#94A3B8":st==="error"?"#DC2626":"#1E293B"}},s.label),
                e("div",{className:"step-sub"},st==="running"&&i===1?`Elapsed: ${elapsed}s - waiting for pod readiness...`:st==="error"?"Failed: unable to connect to K8s API. Check RBAC permissions.":s.sub),
                st==="error"&&e("div",{style:{marginTop:10}},e(Btn,{variant:"primary",size:"sm",onClick:()=>setCurrent(2)},"Retry from step 3"))
              )
            ),
            i<6&&e("div",{className:"step-connector",style:{background:st==="complete"?"#BBF7D0":"#E2E8F0"}})
          );
        })
      )
    ),
    allDone&&e("div",{style:{marginTop:20}},
      e("div",{className:"alert alert-succ",style:{marginBottom:14}},SVG_ICONS.check,e("span",null,"Metabase instance provisioned at analytics-acmecorp.internal.brijjworks. Connection saved.")),
      e(Btn,{variant:"primary",onClick:()=>onNavigate("users-list")},"Go to Analytics Users  \u2192")
    )
  );
};

        e("div",{style:{fontSize:10,fontWeight:700,color:"#94A3B8",letterSpacing:".08em",padding:"0 8px 8px",textTransform:"uppercase"}},"Menu"),
        ...[["Contacts","users"],["Deals","money"],["Activities","help"]].map(([l,i])=>
          e("div",{key:l,style:{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,cursor:"pointer",fontSize:13,color:"#64748B",fontWeight:500,transition:"all .2s"}},SVG_ICONS[i],l)
        ),
        e("div",{style:{height:1,background:"#F1F5F9",margin:"10px 0"}}),
        e("div",{style:{fontSize:10,fontWeight:700,color:"#3B82F6",letterSpacing:".08em",padding:"4px 8px 8px",textTransform:"uppercase"}},"Analytics"),
        e("div",{className:"analytics-item ai-active",onClick:()=>onNavigate("embedded")},SVG_ICONS.chart,"Sales Overview"),
        e("div",{className:"analytics-item",onClick:()=>onNavigate("embedded")},SVG_ICONS.chart,"Lead Funnel")
      ),
      e("div",{style:{flex:1}},
        e("div",{className:"card"},
          e("div",{className:"card-body"},
            e("div",{style:{fontWeight:700,color:"#0F172A",marginBottom:8,fontSize:15}},"Sales Overview"),
            e("div",{style:{color:"#64748B",fontSize:13,marginBottom:14,lineHeight:1.5}},"Click a dashboard in the analytics sidebar to view it embedded. Menu items appear when you hold Analytics:View and at least one Analytics:Dashboard permission for this app."),
            e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
              e("div",{className:"badge b-green"},"Analytics:View"),
              e("div",{className:"badge b-blue"},"Analytics:Dashboard:1"),
              e("div",{className:"badge b-blue"},"Analytics:Dashboard:2")
            )
          )
        )
      )
    )
  );

/* ── Screen: Embedded ── */
const ScreenEmbedded=({onNavigate})=>
  e("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",overflow:"hidden"}},
    e("div",{className:"mb-chrome"},
      e("span",{className:"mb-logo"},"metabase"),
      e("span",{className:"mb-nav-item mb-active"},"Sales Overview"),
      e("span",{className:"mb-nav-item"},"Browse data"),
      e("span",{style:{marginLeft:"auto",fontSize:12,color:"rgba(255,255,255,.6)"}},"+")
    ),
    e("div",{style:{background:"#F3F4F6",flex:1,padding:22,overflow:"auto"}},
      e("div",{style:{fontSize:15,fontWeight:700,color:"#0F172A",marginBottom:16}},"Sales Overview \u2014 Q1 2025"),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}},
        ...[["Total Revenue","\u20B924.6L","+12%"],["Deals Closed","43","+8%"],["Win Rate","68%","+3%"],["Avg Deal Size","\u20B957K","+5%"]].map(([l,v,c])=>
          e("div",{key:l,className:"metric-card"},e("div",{className:"metric-lbl",style:{marginBottom:4}},l),e("div",{className:"metric-val"},v),e("div",{className:"metric-chg"},c+" vs last quarter"))
        )
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1.5fr 1fr",gap:14}},
        e("div",{style:{background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,padding:18,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}},
          e("div",{style:{fontSize:14,fontWeight:700,color:"#0F172A",marginBottom:14}},"Monthly Revenue"),
          e("div",{className:"bar-chart"},...[40,55,38,70,60,80,65,90,75,88,72,95].map((h,i)=>e("div",{key:i,className:"bar"+(i%3===0?" bar-alt":""),style:{height:h*0.8+"px",flex:1}}))),
          e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94A3B8",marginTop:6}},"Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec".split(" ").map(m=>e("span",{key:m},m)))
        ),
        e("div",{style:{background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,padding:18,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}},
          e("div",{style:{fontSize:14,fontWeight:700,color:"#0F172A",marginBottom:14}},"Pipeline by Stage"),
          ...[["Prospecting","68%","#3B82F6"],["Proposal","42%","#60A5FA"],["Negotiation","28%","#93C5FD"],["Closed","15%","#BFDBFE"]].map(([l,p,c])=>
            e("div",{key:l,style:{marginBottom:10}},
              e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},e("span",{style:{color:"#374151",fontWeight:500}},l),e("span",{style:{color:"#64748B",fontWeight:600}},p)),
              e("div",{style:{height:7,background:"#F1F5F9",borderRadius:4}},e("div",{style:{height:"100%",width:p,background:c,borderRadius:4}}))
            )
          )
        )
      )
    ),
    e("div",{style:{background:"#fff",borderTop:"1px solid #E2E8F0",padding:"8px 18px",fontSize:11,color:"#94A3B8",display:"flex",justifyContent:"space-between",fontWeight:500}},
      e("span",null,"Metabase OSS \u00B7 Embedded via signed JWT"),
      e("span",null,"Data scoped to Acme Corp via bw_acmecorp_ro \u00B7 Token expires in 14m 32s")
    )
  );

/* ── Error Screen ── */
const ErrorScreen=({type})=>{
  const cfg={
    "err-noaccess":{icon:SVG_ICONS.shield,title:"Access denied",sub:"You don't have permission to view this dashboard.",hint:"Contact your admin to request Analytics:Dashboard access.",btn:"Go back",color:"#FEF2F2",textColor:"#DC2626",borderColor:"#FECACA"},
    "err-unavailable":{icon:SVG_ICONS.warn,title:"Dashboard temporarily unavailable",sub:"Could not connect to the Metabase instance. The pod may be starting up.",hint:"This usually resolves in 30-60 seconds.",btn:"Retry",color:"#FFFBEB",textColor:"#B45309",borderColor:"#FDE68A"},
    "err-disconnected":{icon:SVG_ICONS.plug,title:"Analytics integration is disconnected",sub:"Your company's analytics integration has been suspended.",hint:"Contact your administrator to reconnect.",btn:"Learn more",color:"#F8FAFC",textColor:"#64748B",borderColor:"#E2E8F0"}
  }[type]||{};
  return e("div",{className:"error-screen"},
    e("div",{style:{width:72,height:72,background:cfg.color,border:"2px solid "+(cfg.borderColor||"#E2E8F0"),borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",color:cfg.textColor,marginBottom:6}},e("div",{style:{transform:"scale(2)"}},cfg.icon)),
    e("div",{style:{fontSize:18,fontWeight:700,color:cfg.textColor}},cfg.title),
    e("div",{style:{fontSize:13,color:"#64748B",maxWidth:340,lineHeight:1.5}},cfg.sub),
    e("div",{style:{fontSize:12,color:"#94A3B8",marginTop:4}},cfg.hint),
    e(Btn,{variant:"outline",size:"sm"},cfg.btn)
  );
};

/* ── App ── */
function App(){
  const [screen,setScreen]=useState("not-connected");
  const [tab,setTab]=useState("connection");
  const handleNav=(s)=>{
    setScreen(s);
    if(s==="connected"||s==="degraded") setTab("connection");
    if(s==="users-list") setTab("users");
    if(s==="mappings-list") setTab("mappings");
  };
  const settingsScreens=["not-connected","wizard-running","wizard-error","wizard-complete","connected","degraded","disconnect-dialog","users-list","add-user","mappings-list","create-mapping","edit-mapping"];
  const isApp=["app-menu","embedded","err-noaccess","err-unavailable","err-disconnected"].includes(screen);
  const isEmbed=screen==="embedded";
  const showBreadcrumb=settingsScreens.includes(screen)&&!["wizard-running","wizard-error","wizard-complete","disconnect-dialog","add-user","create-mapping","edit-mapping"].includes(screen);

  const renderContent=()=>{
    switch(screen){
      case "not-connected": return e(ScreenNotConnected,{onNavigate:handleNav});
      case "wizard-running": return e(ScreenWizard,{key:"wiz-r",mode:"running",onNavigate:handleNav});
      case "wizard-error":   return e(ScreenWizard,{key:"wiz-e",mode:"error",onNavigate:handleNav});
      case "wizard-complete":return e(ScreenWizard,{key:"wiz-c",mode:"complete",onNavigate:handleNav});
      case "connected":      return e(ScreenConnected,{tab:"connection",onTab:setTab,status:"connected",onNavigate:handleNav});
      case "degraded":       return e(ScreenConnected,{tab:"connection",onTab:setTab,status:"degraded",onNavigate:handleNav});
      case "disconnect-dialog": return e(ScreenDisconnectDialog,{onNavigate:handleNav});
      case "users-list":     return e(ScreenUsers,{onNavigate:handleNav});
      case "add-user":       return e(ScreenAddUser,{onNavigate:handleNav});
      case "mappings-list":  return e(ScreenMappings,{onNavigate:handleNav});
      case "create-mapping": return e(ScreenCreateMapping,{onNavigate:handleNav});
      case "edit-mapping":   return e(ScreenEditMapping,{onNavigate:handleNav});
      case "app-menu":       return e(ScreenAppMenu,{onNavigate:handleNav});
      case "embedded":       return e(ScreenEmbedded,{onNavigate:handleNav});
      default:               return e(ErrorScreen,{type:screen});
    }
  };

  return e("div",{className:"proto-root"},
    e(ProtoNav,{screen,onSelect:handleNav}),
    e("div",{className:"bw-shell"},
      e(TopBar),
      e("div",{className:"bw-body"},
        isApp?e(Sidebar,{type:"wide"}):e(Sidebar,{type:"icon"}),
        e("div",{className:"bw-content",style:{padding:isEmbed?0:28,overflow:isEmbed?"hidden":"auto"}},
          showBreadcrumb&&e("div",{style:{display:"flex",gap:8,fontSize:11,color:"#94A3B8",marginBottom:18,alignItems:"center",fontWeight:500}},"Settings"," / ","Integrations"," / ",e("span",{style:{color:"#3B82F6",fontWeight:600}},"Metabase Analytics")),
          renderContent()
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
