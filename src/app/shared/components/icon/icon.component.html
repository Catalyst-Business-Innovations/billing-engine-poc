<svg 
  [attr.width]="width" 
  [attr.height]="height" 
  [attr.class]="class"
  viewBox="0 0 24 24" 
  fill="none" 
  stroke="currentColor" 
  [attr.stroke-width]="strokeWidth" 
  stroke-linecap="round" 
  stroke-linejoin="round">
  
  <!-- Plus Icon -->
  <ng-container *ngIf="name === 'plus'">
    <line x1="12" y1="5" x2="12" y2="19"></line>
    <line x1="5" y1="12" x2="19" y2="12"></line>
  </ng-container>

  <!-- Close Icon -->
  <ng-container *ngIf="name === 'close'">
    <line x1="18" y1="6" x2="6" y2="18"></line>
    <line x1="6" y1="6" x2="18" y2="18"></line>
  </ng-container>

  <!-- Edit Icon -->
  <ng-container *ngIf="name === 'edit'">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
  </ng-container>

  <!-- Delete Icon -->
  <ng-container *ngIf="name === 'delete'">
    <polyline points="3 6 5 6 21 6"></polyline>
    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
  </ng-container>

  <!-- Search Icon -->
  <ng-container *ngIf="name === 'search'">
    <circle cx="11" cy="11" r="8"></circle>
    <path d="m21 21-4.35-4.35"></path>
  </ng-container>

  <!-- Chevron Down -->
  <ng-container *ngIf="name === 'chevron-down'">
    <polyline points="6 9 12 15 18 9"></polyline>
  </ng-container>

  <!-- Chevron Up -->
  <ng-container *ngIf="name === 'chevron-up'">
    <polyline points="18 15 12 9 6 15"></polyline>
  </ng-container>

  <!-- Checkmark -->
  <ng-container *ngIf="name === 'checkmark'">
    <polyline points="20 6 9 17 4 12"></polyline>
  </ng-container>

  <!-- Clear (X in circle) -->
  <ng-container *ngIf="name === 'clear'">
    <circle cx="12" cy="12" r="10"></circle>
    <line x1="15" y1="9" x2="9" y2="15"></line>
    <line x1="9" y1="9" x2="15" y2="15"></line>
  </ng-container>

  <!-- Copy/Duplicate Icon -->
  <ng-container *ngIf="name === 'copy'">
    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
  </ng-container>
</svg>
